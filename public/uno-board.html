<!-- UNO 3D Board Visual Demo -->
<div id="uno-world">
  <div class="uno-table">
    <div class="table-underside"></div>
    <div class="table-felt-ring"></div>
    <div class="table-felt">
      <div class="table-watermark">UNO</div>
      <div class="table-arrow">↻</div>
      <div class="draw-pile">
        <div class="pile-label">DRAW</div>
        <div class="draw-stack"></div>
      </div>
      <div class="discard-pile">
        <div class="pile-label">DISCARD</div>
        <div class="discard-stack"></div>
      </div>
    </div>
    <div class="table-leg leg1"></div>
    <div class="table-leg leg2"></div>
    <div class="table-leg leg3"></div>
    <div class="table-leg leg4"></div>
  </div>
  <div class="hand-row player-hand"></div>
  <div class="hand-row opp-top"></div>
  <div class="hand-col opp-left"></div>
  <div class="hand-col opp-right"></div>
  <!-- HUD -->
  <div class="hud-pill hud-turn">✦ Your Turn</div>
  <div class="hud-pill hud-timer">20s</div>
  <div class="hud-pill hud-hint">Hover your cards to lift them</div>
  <button class="uno-btn">UNO!</button>
</div>
