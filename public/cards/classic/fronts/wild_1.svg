<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350" width="250" height="350">
  <defs>
    <clipPath id="cc-wild"><rect x="0" y="0" width="250" height="350" rx="18" ry="18"/></clipPath>
    <!-- Oval clip for colour quarters -->
    <clipPath id="ov-clip-wild">
      <ellipse cx="125" cy="175" rx="88" ry="120"
               transform="rotate(-20,125,175)"/>
    </clipPath>
    <radialGradient id="dark-centre-wild" cx="50%" cy="45%" r="60%">
      <stop offset="0%"   stop-color="#252535"/>
      <stop offset="100%" stop-color="#0A0A18"/>
    </radialGradient>
    <linearGradient id="shine-wild" x1="0%" y1="0%" x2="55%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="55%"  stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="brd-wild" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.12"/>
    </linearGradient>
    <radialGradient id="bg-dark-wild" cx="40%" cy="35%" r="75%">
      <stop offset="0%"   stop-color="#1C2636"/>
      <stop offset="100%" stop-color="#080C14"/>
    </radialGradient>
    <filter id="dropshadow-wild" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="txtshadow-wild">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.70"/>
    </filter>
    <filter id="glowfilter-wild" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g clip-path="url(#cc-wild)">
    <!-- Dark background -->
    <rect x="0" y="0" width="250" height="350" fill="url(#bg-dark-wild)"/>
    <!-- Background shimmer rings -->
    <ellipse cx="125" cy="175" rx="115" ry="152" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-opacity="0.07"/>
    <ellipse cx="125" cy="175" rx="92"  ry="122" fill="none" stroke="#FFFFFF" stroke-width="0.7" stroke-opacity="0.05"/>
    <!-- Corner accent dots -->
    <circle cx="12"   cy="12"   r="3" fill="#FFFFFF" opacity="0.18"/>
    <circle cx="238" cy="12"   r="3" fill="#FFFFFF" opacity="0.18"/>
    <circle cx="12"   cy="338" r="3" fill="#FFFFFF" opacity="0.18"/>
    <circle cx="238" cy="338" r="3" fill="#FFFFFF" opacity="0.18"/>

    <!-- Four colour quarters, clipped to oval shape -->
    <g clip-path="url(#ov-clip-wild)">
      <!-- Top-left: red -->
      <rect x="33" y="51" width="94" height="126" fill="#CC2222"/>
      <!-- Top-right: blue -->
      <rect x="125" y="51" width="94" height="126" fill="#1551A8"/>
      <!-- Bottom-left: yellow -->
      <rect x="33" y="175" width="94" height="126" fill="#E8A000"/>
      <!-- Bottom-right: green -->
      <rect x="125" y="175" width="94" height="126" fill="#1A7A2E"/>
      <!-- Thin cross-hair dividers -->
      <line x1="125" y1="51" x2="125" y2="299"
            stroke="#0A0A18" stroke-width="2.5"/>
      <line x1="33" y1="175" x2="217" y2="175"
            stroke="#0A0A18" stroke-width="2.5"/>
    </g>
    <!-- Oval border -->
    <ellipse cx="125" cy="175" rx="88" ry="120"
             fill="none" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.30"
             transform="rotate(-20,125,175)"/>
    <ellipse cx="125" cy="175" rx="83" ry="115"
             fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.10"
             transform="rotate(-20,125,175)"/>
    <!-- Dark centre circle -->
    <ellipse cx="125" cy="175" rx="56" ry="74"
             fill="url(#dark-centre-wild)" filter="url(#dropshadow-wild)"/>
    <ellipse cx="125" cy="175" rx="56" ry="74"
             fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.22"/>
    <!-- Centre label -->
    <text x="125" y="187"
          font-family="'Arial Black',Arial,sans-serif" font-size="32" font-weight="900"
          fill="#FFFFFF" text-anchor="middle" letter-spacing="2"
          filter="url(#glowfilter-wild)">WILD</text>
    <!-- Sparkle stars -->
    <text x="28"    y="44"    font-size="13" fill="#FFD700" opacity="0.75" text-anchor="middle">✦</text>
    <text x="222" y="44"   font-size="13" fill="#FFD700" opacity="0.75" text-anchor="middle">✦</text>
    <text x="28"    y="322" font-size="13" fill="#FFD700" opacity="0.75" text-anchor="middle">✦</text>
    <text x="222" y="322" font-size="13" fill="#FFD700" opacity="0.75" text-anchor="middle">✦</text>
    <!-- Corner W labels -->
    <text x="15" y="48" font-family="'Arial Black',Arial,sans-serif" font-size="30" font-weight="900"
          fill="#FFFFFF" filter="url(#txtshadow-wild)">W</text>
    <text x="235" y="338" font-family="'Arial Black',Arial,sans-serif" font-size="30" font-weight="900"
          fill="#FFFFFF" text-anchor="end" filter="url(#txtshadow-wild)"
          transform="rotate(180,125,175)">W</text>
    <rect x="0" y="0" width="250" height="350" fill="url(#shine-wild)"/>
  </g>
  <rect x="1.5" y="1.5" width="247" height="347" rx="17" ry="17" fill="none" stroke="url(#brd-wild)" stroke-width="2.5"/>
  <rect x="0"   y="0"   width="250"   height="350"   rx="18"   ry="18"   fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.28"/>
</svg>