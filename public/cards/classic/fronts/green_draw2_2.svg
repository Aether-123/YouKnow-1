<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350" width="250" height="350">
  <defs>
    <clipPath id="cc-green-draw2"><rect x="0" y="0" width="250" height="350" rx="18" ry="18"/></clipPath>

    <radialGradient id="bg-green-draw2" cx="35%" cy="28%" r="80%">
      <stop offset="0%"   stop-color="#4CAF50"/>
      <stop offset="50%"  stop-color="#1A7A2E"/>
      <stop offset="100%" stop-color="#0F4A1A"/>
    </radialGradient>

    <radialGradient id="ov-green-draw2" cx="38%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#E8E8E8" stop-opacity="0.92"/>
    </radialGradient>

    <linearGradient id="shine-green-draw2" x1="0%" y1="0%" x2="55%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="brd-green-draw2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.10"/>
    </linearGradient>

    <filter id="dropshadow-green-draw2" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#062a0b" flood-opacity="0.60"/>
    </filter>
    <filter id="txtshadow-green-draw2">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1.5" flood-color="#062a0b" flood-opacity="0.70"/>
    </filter>
    <filter id="symglow-green-draw2" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g clip-path="url(#cc-green-draw2)">
    <rect x="0" y="0" width="250" height="350" fill="url(#bg-green-draw2)"/>
    <!-- Decorative background ovals -->
    <ellipse cx="125" cy="175" rx="112" ry="155" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-opacity="0.10"/>
    <ellipse cx="125" cy="175" rx="88"  ry="122" fill="none" stroke="#FFFFFF" stroke-width="0.7" stroke-opacity="0.07"/>
    <!-- Corner accent dots -->
    <circle cx="12"   cy="12"   r="3" fill="#FFFFFF" opacity="0.18"/>
    <circle cx="238" cy="12"   r="3" fill="#FFFFFF" opacity="0.18"/>
    <circle cx="12"   cy="338" r="3" fill="#FFFFFF" opacity="0.18"/>
    <circle cx="238" cy="338" r="3" fill="#FFFFFF" opacity="0.18"/>

    <!-- Centre white oval -->
    <ellipse cx="125" cy="175" rx="86" ry="114" fill="url(#ov-green-draw2)"
             transform="rotate(-20,125,175)" filter="url(#dropshadow-green-draw2)"/>
    <ellipse cx="125" cy="175" rx="86" ry="114" fill="none" stroke="#CCCCCC" stroke-width="1"
             transform="rotate(-20,125,175)"/>
    <!-- DRAW TWO: two fanned playing cards -->
    <!-- Back card (card colour) -->

    <!-- Mini card (rotate -14°) -->
    <g transform="rotate(-14,111,167)">
      <rect x="76.0" y="119.0" width="70" height="96" rx="8" ry="8"
            fill="#1A7A2E" stroke="#FFFFFF" stroke-width="2.5"
            filter="url(#dropshadow-green-draw2)"/>
      <!-- Inner border -->
      <rect x="80.0" y="123.0" width="62" height="88" rx="6" ry="6"
            fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.35"/>
      <!-- Big centre value -->
      <text x="111" y="179.6" font-family="'Arial Black',Arial,sans-serif"
            font-size="36" font-weight="900" fill="#FFFFFF" text-anchor="middle">+2</text>
      <!-- Top-left pip -->
      <text x="83.0" y="142.0" font-family="'Arial Black',Arial,sans-serif"
            font-size="17" font-weight="900" fill="#FFFFFF">+2</text>
      <!-- Bottom-right pip (rotated 180) -->
      <text x="139.0" y="209.0" font-family="'Arial Black',Arial,sans-serif"
            font-size="17" font-weight="900" fill="#FFFFFF" text-anchor="end"
            transform="rotate(180,111,167)">+2</text>
    </g>
    <!-- Front card (white) -->

    <!-- Mini card (rotate 10°) -->
    <g transform="rotate(10,137,179)">
      <rect x="102.0" y="131.0" width="70" height="96" rx="8" ry="8"
            fill="#FFFFFF" stroke="#1A7A2E" stroke-width="2.5"
            filter="url(#dropshadow-green-draw2)"/>
      <!-- Inner border -->
      <rect x="106.0" y="135.0" width="62" height="88" rx="6" ry="6"
            fill="none" stroke="#1A7A2E" stroke-width="1" stroke-opacity="0.35"/>
      <!-- Big centre value -->
      <text x="137" y="191.6" font-family="'Arial Black',Arial,sans-serif"
            font-size="36" font-weight="900" fill="#1A7A2E" text-anchor="middle">+2</text>
      <!-- Top-left pip -->
      <text x="109.0" y="154.0" font-family="'Arial Black',Arial,sans-serif"
            font-size="17" font-weight="900" fill="#1A7A2E">+2</text>
      <!-- Bottom-right pip (rotated 180) -->
      <text x="165.0" y="221.0" font-family="'Arial Black',Arial,sans-serif"
            font-size="17" font-weight="900" fill="#1A7A2E" text-anchor="end"
            transform="rotate(180,137,179)">+2</text>
    </g>

    <text x="125" y="271" font-family="'Arial Black',Arial,sans-serif"
          font-size="15" font-weight="900" fill="#FFFFFF" text-anchor="middle"
          filter="url(#txtshadow-green-draw2)" letter-spacing="1">DRAW TWO</text>
    <!-- Corner labels -->
    <text x="15" y="48" font-family="'Arial Black',Arial,sans-serif" font-size="30" font-weight="900"
          fill="#FFFFFF" filter="url(#txtshadow-green-draw2)">+2</text>
    <text x="235" y="338" font-family="'Arial Black',Arial,sans-serif" font-size="30" font-weight="900"
          fill="#FFFFFF" text-anchor="end" filter="url(#txtshadow-green-draw2)"
          transform="rotate(180,125,175)">+2</text>
    <rect x="0" y="0" width="250" height="350" fill="url(#shine-green-draw2)"/>
  </g>
  <rect x="1.5" y="1.5" width="247" height="347" rx="17" ry="17" fill="none" stroke="url(#brd-green-draw2)" stroke-width="2.5"/>
  <rect x="0"   y="0"   width="250"   height="350"   rx="18"   ry="18"   fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.28"/>
</svg>